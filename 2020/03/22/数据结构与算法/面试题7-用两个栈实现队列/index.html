<meta name="description" content="题目 输入一个链表，输出该链表中倒数第k个结点。 解题 队列的特性是：“先入先出”，栈的特性是：“先入后出”。 **push：**直接push进stack1。 **pop：**当stack2 中不为空时， 在stack2 中的栈顶元素是最先进入队列的元素， 直接弹出stack2栈顶元素；如果 stack2 为空时，我们把stack1中的元素逐个弹出并压入stack2，再弹出stack2栈顶元素。">
